name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin the uv version explicitly so CI is reproducible.
          version: "0.5.x"
          # Cache uv's download cache and the project venv.
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Create venv and install
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest
